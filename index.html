<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warm Email Sender</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .badge-sent { background: #065f46; color: #6ee7b7; }
        .badge-replied { background: #1e40af; color: #93c5fd; }
        .badge-bounced { background: #991b1b; color: #fca5a5; }
        .badge-no-reply { background: #374151; color: #9ca3af; }
        .badge-failed { background: #991b1b; color: #fca5a5; }
        .badge-sending { background: #92400e; color: #fcd34d; }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        textarea { resize: vertical; }
        .upload-zone { border: 2px dashed #475569; transition: all 0.2s; }
        .upload-zone:hover, .upload-zone.dragover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        const API = window.location.origin + '/api';

        // ── Badge Component ─────────────────────────────────────
        function Badge({ status }) {
            const cls = {
                'SENT': 'badge-sent', 'REPLIED': 'badge-replied',
                'BOUNCED': 'badge-bounced', 'NO_REPLY': 'badge-no-reply',
                'FAILED': 'badge-failed', 'SENDING': 'badge-sending',
            }[status] || 'badge-no-reply';
            return <span className={`${cls} px-2 py-0.5 rounded-full text-xs font-medium`}>{status}</span>;
        }

        // ── Stat Card ───────────────────────────────────────────
        function StatCard({ label, value, sub, color }) {
            return (
                <div className="card p-4">
                    <div className={`text-2xl font-bold ${color || 'text-white'}`}>{value}</div>
                    <div className="text-sm text-slate-400 mt-1">{label}</div>
                    {sub && <div className="text-xs text-slate-500 mt-1">{sub}</div>}
                </div>
            );
        }

        // ── Account Switcher ─────────────────────────────────────
        function AccountSwitcher({ currentEmail, onSwitch }) {
            const [accounts, setAccounts] = useState([]);
            const [open, setOpen] = useState(false);

            useEffect(() => {
                fetch(`${API}/accounts`).then(r => r.json()).then(d => setAccounts(d.accounts || [])).catch(() => {});
            }, [currentEmail]);

            if (accounts.length <= 1) {
                return (
                    <a href="/setup" className="text-xs text-blue-400 hover:text-blue-300 transition">
                        + Add Account
                    </a>
                );
            }

            return (
                <div className="relative">
                    <button onClick={() => setOpen(!open)} className="text-xs text-blue-400 hover:text-blue-300 flex items-center gap-1 transition">
                        Switch Account ▾
                    </button>
                    {open && (
                        <div className="absolute right-0 top-6 bg-slate-800 border border-slate-600 rounded-lg shadow-xl z-50 py-1 min-w-[260px]">
                            {accounts.map(acc => (
                                <button key={acc.email}
                                        onClick={() => { onSwitch(acc.email); setOpen(false); }}
                                        className={`w-full text-left px-4 py-2 text-sm hover:bg-slate-700 flex items-center gap-2 ${acc.email === currentEmail ? 'text-blue-400' : 'text-slate-300'}`}>
                                    <span className={`w-2 h-2 rounded-full ${acc.email === currentEmail ? 'bg-blue-400' : acc.valid ? 'bg-emerald-400' : 'bg-red-400'}`}></span>
                                    {acc.email}
                                    {acc.email === currentEmail && <span className="text-xs text-slate-500 ml-auto">active</span>}
                                </button>
                            ))}
                            <div className="border-t border-slate-700 mt-1 pt-1">
                                <a href="/setup" className="block px-4 py-2 text-sm text-blue-400 hover:bg-slate-700">+ Add Account</a>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ── Main App ────────────────────────────────────────────
        function App() {
            const [tab, setTab] = useState('send');       // send | log
            const [status, setStatus] = useState(null);
            const [recipients, setRecipients] = useState([]);
            const [uploadErrors, setUploadErrors] = useState([]);
            const [sendProgress, setSendProgress] = useState(null);
            const [log, setLog] = useState(null);
            const [tracking, setTracking] = useState(false);
            const [error, setError] = useState(null);
            const [accounts, setAccounts] = useState([]);
            const fileRef = useRef();
            const pollRef = useRef();

            // Fetch status on mount
            useEffect(() => {
                fetchStatus();
                fetchLog();
                fetchAccounts();
            }, []);

            async function fetchAccounts() {
                try {
                    const res = await fetch(`${API}/accounts`);
                    const data = await res.json();
                    setAccounts(data.accounts?.filter(a => a.valid) || []);
                } catch (e) {}
            }

            // Poll send status when sending
            useEffect(() => {
                if (sendProgress?.is_sending) {
                    pollRef.current = setInterval(async () => {
                        try {
                            const res = await fetch(`${API}/send-status`);
                            const data = await res.json();
                            setSendProgress(data);
                            if (!data.is_sending) {
                                clearInterval(pollRef.current);
                                fetchStatus();
                                fetchLog();
                            }
                        } catch (e) {}
                    }, 2000);
                    return () => clearInterval(pollRef.current);
                }
            }, [sendProgress?.is_sending]);

            async function switchAccount(email) {
                try {
                    const res = await fetch(`${API}/accounts/switch`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email }),
                    });
                    if (res.ok) { fetchStatus(); fetchLog(); }
                    else { const d = await res.json(); setError(d.error); }
                } catch (e) { setError('Switch failed: ' + e.message); }
            }

            async function fetchStatus() {
                try {
                    const res = await fetch(`${API}/status`);
                    const data = await res.json();
                    setStatus(data);
                    if (!data.authenticated) setError(data.message);
                } catch (e) {
                    setError('Cannot connect to server. Is app.py running?');
                }
            }

            async function fetchLog() {
                try {
                    const res = await fetch(`${API}/log`);
                    setLog(await res.json());
                } catch (e) {}
            }

            async function handleUpload(file) {
                if (!file) return;
                setError(null);
                const form = new FormData();
                form.append('file', file);
                try {
                    const res = await fetch(`${API}/upload`, { method: 'POST', body: form });
                    const data = await res.json();
                    if (!res.ok) { setError(data.error); return; }
                    setRecipients(data.recipients);
                    setUploadErrors(data.errors || []);
                } catch (e) {
                    setError('Upload failed: ' + e.message);
                }
            }

            async function handleSend() {
                if (!recipients.length) return;
                setError(null);
                try {
                    const res = await fetch(`${API}/send`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ recipients }),
                    });
                    const data = await res.json();
                    if (!res.ok) { setError(data.error); return; }
                    setSendProgress({ is_sending: true, current: 0, total: recipients.length, results: [], next_send_in: 0 });
                } catch (e) {
                    setError('Send failed: ' + e.message);
                }
            }

            async function handleTrack() {
                setTracking(true);
                try {
                    const res = await fetch(`${API}/track`, { method: 'POST' });
                    const data = await res.json();
                    if (res.ok) setLog(data);
                    else setError(data.error);
                } catch (e) {
                    setError('Track failed: ' + e.message);
                } finally {
                    setTracking(false);
                }
            }

            function handleDrop(e) {
                e.preventDefault();
                e.currentTarget.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file) handleUpload(file);
            }

            const isSending = sendProgress?.is_sending;

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <div className="border-b border-slate-700 bg-slate-900/50 backdrop-blur">
                        <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div>
                                <h1 className="text-xl font-bold text-white">Warm Email Sender</h1>
                                {status?.authenticated && (
                                    <div className="flex items-center gap-3 mt-0.5">
                                        <p className="text-sm text-slate-400">Sending as <span className="text-blue-400">{status.sender_email}</span></p>
                                        <AccountSwitcher currentEmail={status.sender_email} onSwitch={switchAccount} />
                                    </div>
                                )}
                                {!status?.authenticated && (
                                    <a href="/setup" className="text-sm text-blue-400 hover:text-blue-300 mt-0.5 inline-block">Connect Gmail Account →</a>
                                )}
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => { setTab('send'); }} className={`px-4 py-2 rounded-lg text-sm font-medium transition ${tab === 'send' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white'}`}>
                                    Send
                                </button>
                                <button onClick={() => { setTab('log'); fetchLog(); }} className={`px-4 py-2 rounded-lg text-sm font-medium transition ${tab === 'log' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white'}`}>
                                    Tracking Log
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-6xl mx-auto px-6 py-6">
                        {/* Error Banner */}
                        {error && (
                            <div className="mb-4 p-3 rounded-lg bg-red-900/30 border border-red-800 text-red-300 text-sm flex justify-between">
                                <span>{error}</span>
                                <button onClick={() => setError(null)} className="text-red-400 hover:text-red-200 ml-4">✕</button>
                            </div>
                        )}

                        {/* Status Cards */}
                        {status?.authenticated && (
                            <div className="grid grid-cols-4 gap-4 mb-6">
                                <StatCard label="Sent Today" value={status.today_sent} sub={`of ${status.daily_limit} limit`} color="text-emerald-400" />
                                <StatCard label="Remaining" value={status.remaining} color="text-blue-400" />
                                <StatCard label="Total Sent" value={log?.stats?.total || 0} color="text-white" />
                                <StatCard label="Reply Rate" value={`${log?.stats?.reply_rate || 0}%`} sub={`${log?.stats?.replied || 0} replies`} color="text-purple-400" />
                            </div>
                        )}

                        {/* ── SEND TAB ─────────────────────────────────────── */}
                        {tab === 'send' && (
                            <div className="space-y-4">
                                {/* Sender Picker */}
                                {accounts.length > 0 && !isSending && (
                                    <div className="card p-4 flex items-center justify-between">
                                        <div className="flex items-center gap-3">
                                            <span className="text-sm text-slate-400">Send from:</span>
                                            <select
                                                value={status?.sender_email || ''}
                                                onChange={async (e) => {
                                                    const email = e.target.value;
                                                    await switchAccount(email);
                                                }}
                                                className="bg-slate-800 border border-slate-600 rounded-lg px-3 py-1.5 text-sm text-white focus:outline-none focus:border-blue-500"
                                            >
                                                {accounts.map(acc => (
                                                    <option key={acc.email} value={acc.email}>{acc.email}</option>
                                                ))}
                                            </select>
                                        </div>
                                        <a href="/setup" className="text-xs text-blue-400 hover:text-blue-300 transition">+ Add Account</a>
                                    </div>
                                )}

                                {/* Upload Zone */}
                                {!isSending && (
                                    <div
                                        className="upload-zone card p-8 text-center cursor-pointer"
                                        onClick={() => fileRef.current?.click()}
                                        onDrop={handleDrop}
                                        onDragOver={(e) => { e.preventDefault(); e.currentTarget.classList.add('dragover'); }}
                                        onDragLeave={(e) => e.currentTarget.classList.remove('dragover')}
                                    >
                                        <input ref={fileRef} type="file" accept=".csv" className="hidden" onChange={(e) => handleUpload(e.target.files[0])} />
                                        <div className="text-4xl mb-3">📧</div>
                                        <div className="text-lg font-medium text-slate-300">Drop CSV here or click to upload</div>
                                        <div className="text-sm text-slate-500 mt-1">Columns: Name, Email, Subject, Body, CC (optional), BCC (optional)</div>
                                    </div>
                                )}

                                {/* Upload Errors */}
                                {uploadErrors.length > 0 && (
                                    <div className="card p-3 border-yellow-700">
                                        <div className="text-yellow-400 text-sm font-medium mb-1">⚠️ Warnings:</div>
                                        {uploadErrors.map((err, i) => <div key={i} className="text-yellow-300/70 text-xs">{err}</div>)}
                                    </div>
                                )}

                                {/* Recipients Preview */}
                                {recipients.length > 0 && !isSending && (
                                    <div className="card overflow-hidden">
                                        <div className="p-4 border-b border-slate-700 flex justify-between items-center">
                                            <div>
                                                <h2 className="font-semibold text-white">Preview — {recipients.length} recipients</h2>
                                                {status?.sender_email && <p className="text-xs text-slate-400 mt-0.5">Sending from <span className="text-blue-400">{status.sender_email}</span></p>}
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => { setRecipients([]); setUploadErrors([]); }} className="px-3 py-1.5 text-sm text-slate-400 hover:text-white transition">
                                                    Clear
                                                </button>
                                                <button onClick={handleSend} className="px-4 py-1.5 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-medium rounded-lg transition">
                                                    Send {recipients.length} Email{recipients.length > 1 ? 's' : ''}
                                                </button>
                                            </div>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-sm">
                                                <thead className="bg-slate-800/50">
                                                    <tr>
                                                        <th className="px-4 py-2.5 text-left text-slate-400 font-medium">#</th>
                                                        <th className="px-4 py-2.5 text-left text-slate-400 font-medium">Name</th>
                                                        <th className="px-4 py-2.5 text-left text-slate-400 font-medium">Email</th>
                                                        <th className="px-4 py-2.5 text-left text-slate-400 font-medium">Subject</th>
                                                        <th className="px-4 py-2.5 text-left text-slate-400 font-medium">Body Preview</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {recipients.map((r, i) => (
                                                        <tr key={i} className="border-t border-slate-700/50 hover:bg-slate-800/30">
                                                            <td className="px-4 py-2.5 text-slate-500">{i + 1}</td>
                                                            <td className="px-4 py-2.5 text-white">{r.name}</td>
                                                            <td className="px-4 py-2.5 text-blue-400">{r.email}</td>
                                                            <td className="px-4 py-2.5 text-slate-300">{r.subject}</td>
                                                            <td className="px-4 py-2.5 text-slate-400 max-w-xs truncate">{r.body.substring(0, 80)}...</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {/* Send Progress */}
                                {isSending && (
                                    <div className="card p-6">
                                        <div className="flex items-center gap-3 mb-4">
                                            <div className="w-3 h-3 bg-amber-400 rounded-full pulse"></div>
                                            <h2 className="font-semibold text-white">Sending emails...</h2>
                                        </div>

                                        {/* Progress bar */}
                                        <div className="w-full bg-slate-700 rounded-full h-2.5 mb-3">
                                            <div className="bg-blue-500 h-2.5 rounded-full transition-all duration-500"
                                                 style={{ width: `${(sendProgress.current / sendProgress.total) * 100}%` }}></div>
                                        </div>
                                        <div className="flex justify-between text-sm text-slate-400 mb-4">
                                            <span>{sendProgress.current} of {sendProgress.total} sent</span>
                                            {sendProgress.next_send_in > 0 && (
                                                <span>Next send in {Math.floor(sendProgress.next_send_in / 60)}m {sendProgress.next_send_in % 60}s</span>
                                            )}
                                        </div>

                                        {/* Results so far */}
                                        {sendProgress.results?.length > 0 && (
                                            <div className="space-y-1">
                                                {sendProgress.results.map((r, i) => (
                                                    <div key={i} className="flex items-center gap-2 text-sm">
                                                        <Badge status={r.status} />
                                                        <span className="text-slate-300">{r.name}</span>
                                                        <span className="text-slate-500">{r.email}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* Send Complete */}
                                {sendProgress && !sendProgress.is_sending && sendProgress.results?.length > 0 && (
                                    <div className="card p-6">
                                        <h2 className="font-semibold text-emerald-400 mb-3">✓ Batch complete</h2>
                                        <div className="space-y-1">
                                            {sendProgress.results.map((r, i) => (
                                                <div key={i} className="flex items-center gap-2 text-sm">
                                                    <Badge status={r.status} />
                                                    <span className="text-slate-300">{r.name}</span>
                                                    <span className="text-slate-500">{r.email}</span>
                                                    {r.error && <span className="text-red-400 text-xs">— {r.error}</span>}
                                                </div>
                                            ))}
                                        </div>
                                        <button onClick={() => { setSendProgress(null); setRecipients([]); fetchStatus(); fetchLog(); }}
                                                className="mt-4 px-4 py-1.5 bg-slate-700 hover:bg-slate-600 text-white text-sm rounded-lg transition">
                                            Done
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ── LOG TAB ──────────────────────────────────────── */}
                        {tab === 'log' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-lg font-semibold text-white">Sent Email Log</h2>
                                    <button onClick={handleTrack} disabled={tracking}
                                            className={`px-4 py-2 text-sm font-medium rounded-lg transition ${tracking ? 'bg-slate-700 text-slate-400' : 'bg-blue-600 hover:bg-blue-500 text-white'}`}>
                                        {tracking ? 'Checking replies...' : '🔄 Check for Replies'}
                                    </button>
                                </div>

                                {log?.emails?.length > 0 ? (
                                    <div className="card overflow-hidden">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-sm">
                                                <thead className="bg-slate-800/50">
                                                    <tr>
                                                        <th className="px-4 py-2.5 text-left text-slate-400 font-medium">#</th>
                                                        <th className="px-4 py-2.5 text-left text-slate-400 font-medium">Name</th>
                                                        <th className="px-4 py-2.5 text-left text-slate-400 font-medium">To</th>
                                                        <th className="px-4 py-2.5 text-left text-slate-400 font-medium">Subject</th>
                                                        <th className="px-4 py-2.5 text-left text-slate-400 font-medium">Sent From</th>
                                                        <th className="px-4 py-2.5 text-left text-slate-400 font-medium">Date</th>
                                                        <th className="px-4 py-2.5 text-left text-slate-400 font-medium">Send</th>
                                                        <th className="px-4 py-2.5 text-left text-slate-400 font-medium">Reply</th>
                                                        <th className="px-4 py-2.5 text-left text-slate-400 font-medium">Reply Date</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {[...log.emails].reverse().map((e, i) => (
                                                        <tr key={i} className="border-t border-slate-700/50 hover:bg-slate-800/30">
                                                            <td className="px-4 py-2.5 text-slate-500">{log.emails.length - i}</td>
                                                            <td className="px-4 py-2.5 text-white">{e.name}</td>
                                                            <td className="px-4 py-2.5 text-blue-400">{e.email}</td>
                                                            <td className="px-4 py-2.5 text-slate-300 max-w-xs truncate">{e.subject}</td>
                                                            <td className="px-4 py-2.5 text-slate-400 text-xs">{e.sender_email || '—'}</td>
                                                            <td className="px-4 py-2.5 text-slate-400">{e.sent_date}</td>
                                                            <td className="px-4 py-2.5"><Badge status={e.status} /></td>
                                                            <td className="px-4 py-2.5"><Badge status={e.reply_status} /></td>
                                                            <td className="px-4 py-2.5 text-slate-400">{e.reply_received_at ? e.reply_received_at.substring(0, 10) : '—'}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="card p-8 text-center">
                                        <div className="text-4xl mb-3">📭</div>
                                        <div className="text-slate-400">No emails sent yet</div>
                                        <div className="text-sm text-slate-500 mt-1">Upload a CSV and send your first batch</div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
